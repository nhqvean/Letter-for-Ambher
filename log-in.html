<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Login</title>
</head>
<body style="font-family: Arial; text-align: center; margin-top: 100px;">

    <h2>Login Form 💙</h2>

    <form onsubmit="goToLetter(event)">
        
        <!-- Username -->
        <label>Username:</label><br>
        <input type="text" required><br><br>

        <!-- Date of Birth -->
        <label>Date of Birth:</label><br>
        <input type="date" required><br><br>

        <!-- Button -->
        <button type="submit">Login</button>

    </form>

    <script>
        function goToLetter(event) {
            event.preventDefault(); // para hindi mag refresh

            // redirect papunta sa letter
            window.location.href = "content://com.foxdebug.acodefree.cdv.core.file.provider/cache/shared/letter.html";
        }
    </script>

</body>
</html>
